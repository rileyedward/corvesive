services:
  db:
    image: postgres:15
    restart: on-failure
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    volumes:
      - ./data/db:/var/lib/postgresql/data
    ports:
      - 5432:5432

  web:
    build: .
    restart: on-failure
    user: node
    depends_on:
      - db
    working_dir: /app
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/db
    volumes:
      - .:/app
    ports:
      - 5173:5173
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5173']
      interval: 30s
      timeout: 10s
      retries: 5
