services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: on-failure
    user: node
    depends_on:
      - db
    working_dir: /app
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@localhost:5432/db
    volumes:
      - .:/app
    ports:
      - 5173:5173
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5173']
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
